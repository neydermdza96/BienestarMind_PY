<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><title>Error del servidor — BienestarMind</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0f2d13 0%,#3d9b35 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { background:#fff; border-radius:20px; padding:48px 40px; text-align:center; max-width:420px; box-shadow:0 24px 60px rgba(0,0,0,.3); }
    .icon { font-size:64px; margin-bottom:12px; }
    h2 { font-size:20px; font-weight:700; color:#1e293b; margin:0 0 8px; }
    p  { color:#64748b; font-size:14px; margin:0 0 24px; }
    .stripe { height:4px; background:linear-gradient(90deg,#f47920 60%,#3d9b35 100%); border-radius:2px; margin-bottom:28px; }
    .btn-v { display:inline-flex; align-items:center; gap:8px; padding:11px 24px; background:#f47920; color:#fff; border-radius:10px; text-decoration:none; font-weight:600; font-size:14px; }
    .btn-v:hover { background:#d4651a; color:#fff; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <div class="stripe"></div>
    <h2>Error interno del servidor</h2>
    <p>Ocurrió un error inesperado. El equipo técnico ha sido notificado. Por favor intenta nuevamente en unos minutos.</p>
    <a href="/" class="btn-v"><i class="bi bi-arrow-clockwise"></i> Intentar de nuevo</a>
  </div>
</body>
</html>
